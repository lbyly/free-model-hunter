version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data  # SQLite 持久化
      - ./backend/.env:/app/.env  # 环境变量
    environment:
      - DATABASE_URL=/app/data/models.db
      - SCHEDULE_HOURS=2,14
      - SCRAPER_TIMEOUT=30
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    restart: unless-stopped